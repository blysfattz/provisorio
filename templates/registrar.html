{% extends 'base.html' %}

{% block content %}

<div class="form-wrapper">

    <form class="glass-form" action='/registrar' method="POST">

        <h1>Criar conta</h1>
        <p>Comece sua jornada virtual</p>
        {% if erro %}
            <p style="color:red;">{{ erro }}</p>
        {% endif %}

        <input type="text"     name="nomeForm"   placeholder="Nome">
        <input type="password" name="senhaForm"  placeholder="Senha">

        <input type="password" name ="confirmaForm" placeholder="Confirmar senha">

        <button type="submit">
            Cadastre-se
        </button>

        <span>
            Já tem uma conta?
            <a href="/login">Login</a>
        </span>

    </form>

</div>

{% endblock %}
