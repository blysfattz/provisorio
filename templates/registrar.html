{% extends 'base.html' %}
{% block content %}
<div class="form-wrapper">
    <form class="glass-form" action='/registrar' method="POST">
        <h1>Criar conta</h1>
        <p>Comece sua jornada virtual</p>

        <input type="text" name="nomeForm" placeholder="Nome"
               value="{{ nome_digitado or '' }}">
        {% if erro_nome %}
            <p class="erro">{{ erro_nome }}</p>
        {% endif %}

        <input type="password" name="senhaForm" placeholder="Confirmar Senha">
        {% if erro_senha %}
            <p class="erro">{{ erro_senha }}</p>
        {% endif %}

        <input type="password" name="confirmaForm" placeholder="Confirmar senha">
        {% if erro_confirma %}
            <p class="erro">{{ erro_confirma }}</p>
        {% endif %}

        <button type="submit">Cadastre-se</button>
        <span>Já tem uma conta? <a href="/login">Login</a></span>
    </form>
</div>
{% endblock %}
